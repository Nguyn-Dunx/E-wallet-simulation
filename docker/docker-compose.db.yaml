services:
  db-postgres:
    image: postgres:16.13-alpine
    container_name: digital_wallet-db-postgres
    env_file:
      - ./.env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - digital-wallet_network
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  db_data:

networks:
  digital-wallet_network:
    driver: bridge
